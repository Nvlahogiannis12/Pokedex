<!doctype html>
<html lang="en">
<head>
    <title>Pokédex</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <link rel="icon" type="image/x-icon" href="imgs/Pokedex_Icon.png">

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Saira:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="container-fluid">
    <header class="navbar-header">
        <!-- Menu icon at the top left -->
         <div><img class="settingIcon" src="imgs/icons8-settings-144-removebg-preview.png" onclick="menuToggleFilt()"></div>
        <div id="menuIcon"><img class="settingIcon" src="imgs/Pokedex_Icon.png"></div>
    </header>
    <!-- Sidebar with links -->
    <nav class="sidebar" id="sidebar">
        <div class="Region_Title" id="list">
            <h1>Regions</h1>
        </div>
    </nav>
    <div id="pageOverlay" class="page-overlay hidden"></div>
    <main class="row">
        <div class="container">
            <div class="col-12" id="sprite">
                <h1 class="spriteTitle my-2">Pokédex</h1>
                <div id="instructions">
                    <button id="openPokedexButton">Open Pokédex</button>
                    <p class="instructFadeIn">Press the Pokédex button or settings in the corner to navigate to navigate</p>
                </div>
                <div id="griding"></div>
            </div>
            <div id="filterSettings" class="d-none">
                <h1 class="filterTitle my-2">Filter Settings</h1>
                <h3>Show Shiny</h3>
                <label class="switch">
                    <input type="checkbox" id="shinyToggle" onclick="toggleFilter('Shiny')">
                    <span class="slider round"></span>
                </label>
                <h3>Enhanced Models</h3>
                <label class="switch">
                    <input type="checkbox" id="enhancedToggle" onclick="toggleFilter('Enhanced')">
                    <span class="slider round"></span>
                </label>
                <button class="closeSettingsButton" onclick="menuToggleFilt()"><h3>Close Settings</h3></button>
            </div>
    </main>
    <footer>
        <!-- place footer here -->
    </footer>
    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
